<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            /* Forzamos el cursor de moneda amarilla en toda la interfaz */
            cursor: url('https://img.icons8.com/pixel-line/32/FAB005/coins.png'), auto !important;
        }

        body { 
            background: transparent; 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .jukebox-8bit {
            width: 320px;
            background: #000;
            border: 6px solid #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 8px 8px 0px #555;
            padding: 25px;
        }

        .title {
            font-size: 12px;
            margin-bottom: 25px;
            text-align: center;
            color: #00ff00; /* Verde monitor clásico */
            line-height: 1.6;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-8bit {
            background: #ff0000;
            color: #fff;
            border: 4px solid #fff;
            padding: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            box-shadow: 4px 4px 0px #800000;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 20px;
            transition: none;
        }

        .btn-8bit:active {
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        #spotify-container {
            width: 100%;
            height: 80px;
            background: #222;
            border: 2px dashed #fff;
            overflow: hidden;
        }

        iframe {
            /* Invertimos colores para que pegue con el modo oscuro */
            filter: invert(1) grayscale(1) contrast(1.2);
        }

        .decor {
            margin-top: 15px;
            font-size: 7px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="jukebox-8bit">
        <div class="title">INSERT COIN<br>PLAY MUSIC</div>
        
        <button class="btn-8bit" onclick="shufflePlaylist()">🔀 SHUFFLE</button>
        
        <div id="spotify-container">
            </div>

        <div class="decor">Discopada System v1.1</div>
    </div>

    <script>
        // REEMPLAZA EL LINK DE ABAJO CON TU PLAYLIST PÚBLICA
        const playlistUrl = "https://open.spotify.com/playlist/6FEgbgJL2zeXt7fw2bxFcc?si=23ad5b4e2bc64ea4"; 

        function shufflePlaylist() {
            const container = document.getElementById('spotify-container');
            
            // Verificamos que el link tenga el formato correcto
            if (playlistUrl.includes("/playlist/")) {
                const playlistId = playlistUrl.split("/playlist/")[1].split("?")[0];
                
                container.innerHTML = `
                    <iframe 
                        src="https://support.spotify.com/us/article/shuffle-play/4{playlistId}?utm_source=generator&theme=0" 
                        width="100%" height="80" frameBorder="0" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                    </iframe>`;
            } else {
                container.innerHTML = "<p style='font-size:8px'>Error: URL no válida</p>";
            }
        }

        // Carga la primera canción al abrir
        window.onload = shufflePlaylist;
    </script>
</body>
</html>
