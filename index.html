<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: transparent; 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .jukebox-8bit {
            width: 320px;
            background: #000;
            border: 6px solid #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 8px 8px 0px #555;
            padding: 20px;
        }

        .title {
            font-size: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-8bit {
            background: #ff0000;
            color: #fff;
            border: 4px solid #fff;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #800000;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-8bit:active {
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        /* Ahora el reproductor es parte de la pantalla */
        #spotify-container {
            width: 100%;
            height: 80px;
            background: #222;
            border: 2px dashed #fff;
            overflow: hidden;
        }

        iframe {
            filter: invert(1) grayscale(1) contrast(1.5); /* Estética retro */
        }
    </style>
</head>
<body>

    <div class="jukebox-8bit">
        <div class="title">MUSIC SELECTOR<br>V.1.0</div>
        <button class="btn-8bit" onclick="shufflePlaylist()">🔀 NEW TRACK</button>
        
        <div id="spotify-container">
            </div>
    </div>

    <script>
        const playlistUrl = "https://open.spotify.com/playlist/6FEgbgJL2zeXt7fw2bxFcc?si=096af9006ea2460b"; 

        function shufflePlaylist() {
            const container = document.getElementById('spotify-container');
            const playlistId = playlistUrl.split("/playlist/")[1].split("?")[0];
            
            // Forzamos que cargue una canción random de la lista
            container.innerHTML = `
                <iframe 
                    src="https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator&theme=0" 
                    width="100%" height="80" frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                </iframe>`;
        }

        window.onload = shufflePlaylist;
    </script>
</body>
</html>
