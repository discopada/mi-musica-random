<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: transparent; 
            color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            image-rendering: pixelated;
        }

        /* Contenedor tipo Pantalla de Juego */
        .jukebox-8bit {
            width: 260px;
            height: 200px;
            background: #000;
            border: 6px solid #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 8px 8px 0px #555;
            padding: 20px;
            position: relative;
        }

        /* Efecto de parpadeo retro */
        .title {
            font-size: 10px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
            color: #00ff00; /* Verde monitor viejo */
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Botón estilo Arcade */
        .btn-8bit {
            background: #ff0000;
            color: #fff;
            border: 4px solid #fff;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #800000;
            text-transform: uppercase;
        }

        .btn-8bit:active {
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        /* Escondemos el reproductor pero dejamos lo mínimo para el Play */
        #spotify-container {
            margin-top: 20px;
            width: 80px;
            height: 80px;
            overflow: hidden;
            border: 4px solid #fff;
            filter: grayscale(1) contrast(2);
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        
        #spotify-container:hover { opacity: 1; }

        .decor {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 8px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="jukebox-8bit">
        <div class="title">INSERT COIN<br>PLAY MUSIC</div>
        <button class="btn-8bit" onclick="shufflePlaylist()">SHUFFLE</button>
        <div class="decor">V.1.0</div>
    </div>

    <div id="spotify-container">
        </div>

    <script>
        // REEMPLAZÁ CON TU LINK
        const playlistUrl = "https://open.spotify.com/playlist/6FEgbgJL2zeXt7fw2bxFcc?si=a7bdc2547bbc44fe"; 

        function shufflePlaylist() {
            const container = document.getElementById('spotify-container');
            const playlistId = playlistUrl.split("/playlist/")[1].split("?")[0];
            
            container.innerHTML = `
                <iframe 
                    src="https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator&theme=0" 
                    width="100%" height="80" frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                </iframe>`;
        }

        window.onload = shufflePlaylist;
    </script>
</body>
</html
